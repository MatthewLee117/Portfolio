<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bikewatching</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" />
    <link rel="stylesheet" href="map.css" />
    <script type="module" src="map.js"></script>
  </head>
  <body>
    <div class="map-wrap">
      <h1>Bikewatching</h1>
      <p>Bluebikes traffic flow in Boston and Cambridge.</p>
      <div id="map"></div>

      <label class="time-filter" for="time-slider">
        <span>Time</span>
        <input id="time-slider" type="range" min="-1" max="1439" value="-1" />
        <time id="time-display">Any time</time>
      </label>
    </div>

    <div class="legend" aria-label="Traffic flow legend">
      <div style="--departure-ratio: 1">More departures</div>
      <div style="--departure-ratio: 0.5">Balanced</div>
      <div style="--departure-ratio: 0">More arrivals</div>
    </div>

    <dl id="station-tooltip" class="tooltip" hidden>
      <dt>Station</dt>
      <dd class="station-name"></dd>
      <dt>Total traffic</dt>
      <dd class="station-total"></dd>
      <dt>Departures</dt>
      <dd class="station-departures"></dd>
      <dt>Arrivals</dt>
      <dd class="station-arrivals"></dd>
    </dl>
  </body>
</html>
